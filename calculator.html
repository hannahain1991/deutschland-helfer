
<!DOCTYPE html>

<html lang="uk">

<head>

<meta charset="UTF-8">


<title>Калькулятор виплат</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="calculator" style="color: black;">
    <div class="progress-box">

<div class="progress-text">
Крок <span id="step-number">1</span> із 4
</div>

<div class="progress">

<div class="progress-bar" id="progress-bar"></div>

</div>

</div>

<h1 >Калькулятор виплат</h1>

<label>Ваш вік</label>

<input type="number" id="age">

<br><br>

<label>Кількість дітей</label>

<input type="number" id="children">

<br><br>

<label>Працюєте?</label>

<select id="job">

<option value="yes">Так</option>

<option value="no">Ні</option>

</select>

<br><br>

<label>Місячний дохід (€)</label>

<input type="number" id="income">

<br><br>

<button id="calculate-btn">

Розрахувати

</button>

<div id="result"></div>

</div>

<script src="calculator.js"></script>

</body>

</html>
